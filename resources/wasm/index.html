<!DOCTYPE html>
<html>

<head>
  <title>webapp</title>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

  <meta name="title" content="webapp">
  <meta name="description" content="this is an webapp.">
  <meta name="viewport" content="width=device-width">
  <style>
    body {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      margin: 0;
      padding: 0;
      background-color: black;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    body canvas {
      object-fit: contain;
      max-height: 100%;
      max-width: 100%;
    }
  </style>
</head>

<body>
  <canvas id="canvas" width="800" height="450"></canvas>

  <script>
    var Module = {
      print: console.log,
      printErr: console.error,
      canvas: (function () {
        return document.getElementById('canvas');
      })()
    }
  </script>
  <script type="text/javascript" src="app1.js"></script>
  <script>
    window.Module = {
      canvas: canvas,
      // locateFile: (path) => {
      //   return `/${path}`;
      // },

      print: (text) => {
        console.log('WASM stdout:', text)
      },

      printErr: (text) => {
        console.error('WASM stderr:', text)
      },

      setStatus: (text) => {
        console.log('WASM status:', text)
      },

      onRuntimeInitialized: () => {
        console.log('WASM runtime initialized')
      },

      preRun: [() => {
        console.log('WASM preRun called')
      }],

      postRun: [() => {
        console.log('WASM postRun called')
      }],

      totalDependencies: 0,
      monitorRunDependencies: (left) => {
        Module.totalDependencies = Math.max(Module.totalDependencies, left)
        const msg = left ?
          `Preparing... (${Module.totalDependencies - left}/${Module.totalDependencies})` :
          'All downloads complete'
        console.log(msg)
      }
    }
  </script>
</body>

</html>
