<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>raylib wasm smoke test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #1e1e26;
            color: #d7d7df;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        main {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        canvas {
            width: min(960px, 90vw);
            aspect-ratio: 16 / 9;
            background: black;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
        }

        pre {
            width: min(960px, 90vw);
            max-height: 160px;
            overflow: auto;
            margin: 0;
            font-size: 0.85rem;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 8px;
            padding: 0.75rem;
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <main>
        <canvas id="canvas" tabindex="0"></canvas>
        <pre id="console"></pre>
    </main>

    <script>
        const consoleEl = document.getElementById("console");
        const canvasEl = document.getElementById("canvas");
        canvasEl.width = 960;
        canvasEl.height = 540;

        function appendLine(prefix, args) {
            const text = [prefix, ...args].join(" ");
            console.log(text);
            if (consoleEl) {
                consoleEl.textContent += text + "\n";
                consoleEl.scrollTop = consoleEl.scrollHeight;
            }
        }

        window.Module = {
            canvas: canvasEl,
            print: (...args) => appendLine("[raylib]", args),
            printErr: (...args) => appendLine("[raylib:err]", args),
            onRuntimeInitialized() {
                appendLine("[raylib]", ["runtime initialized"]);
            },
        };
    </script>

    {{{ SCRIPT }}}
</body>

</html>
