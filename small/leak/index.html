<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WASM Leak Playground</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #f2efe8;
        color: #1f1f1f;
      }
      .wrap {
        max-width: 780px;
        margin: 32px auto;
        padding: 0 16px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }
      p {
        margin: 4px 0 16px;
        color: #4b4b4b;
      }
      .panel {
        background: #ffffff;
        border: 1px solid #ded8cc;
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }
      button {
        border: 1px solid #b59f7b;
        background: #f7e2b2;
        padding: 8px 12px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
      }
      button.secondary {
        background: #f0f0f0;
      }
      label {
        display: block;
        margin: 8px 0;
        font-size: 14px;
      }
      input[type="number"] {
        width: 160px;
        padding: 6px;
        border-radius: 6px;
        border: 1px solid #c7c1b5;
        margin-left: 8px;
      }
      #stats {
        font-family: "Courier New", monospace;
        font-size: 13px;
        background: #f6f1e6;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid #e2d8c3;
      }
      #log {
        margin-top: 12px;
        font-family: "Courier New", monospace;
        font-size: 12px;
        background: #111;
        color: #e8e8e8;
        padding: 8px;
        border-radius: 8px;
        height: 140px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>WASM Leak Playground</h1>
      <p>Minimal module for testing memory growth and cleanup.</p>

      <div class="panel">
        <div class="row">
          <button id="create">Create module</button>
          <button id="destroy" class="secondary">Destroy module</button>
          <button id="hold">Hold bytes</button>
          <button id="clear" class="secondary">Clear holds</button>
        </div>

        <label>
          Bytes per hold
          <input id="bytes" type="number" min="1" step="1024" value="1048576" />
        </label>

        <div id="stats">waiting for module...</div>
        <pre id="log"></pre>
      </div>
    </div>

    <script src="leak.js"></script>
    <script>
      const logEl = document.getElementById('log');
      const statsEl = document.getElementById('stats');
      const bytesInput = document.getElementById('bytes');

      let moduleInstance = null;

      function log(message) {
        const timestamp = new Date().toISOString().slice(11, 19);
        logEl.textContent += `[${timestamp}] ${message}\n`;
        logEl.scrollTop = logEl.scrollHeight;
      }

      function formatBytes(bytes) {
        if (!bytes) return '0 B';
        const units = ['B', 'KB', 'MB', 'GB'];
        let value = bytes;
        let idx = 0;
        while (value >= 1024 && idx < units.length - 1) {
          value /= 1024;
          idx += 1;
        }
        const precision = value >= 10 || idx === 0 ? 0 : 1;
        return `${value.toFixed(precision)} ${units[idx]}`;
      }

      function getWasmBytes() {
        if (!moduleInstance) return 0;
        const wasmMemory = moduleInstance.wasmMemory;
        if (wasmMemory && wasmMemory.buffer) {
          return wasmMemory.buffer.byteLength;
        }
        const heap = moduleInstance.HEAP8 && moduleInstance.HEAP8.buffer;
        return heap ? heap.byteLength : 0;
      }

      function updateStats() {
        const heldBytes = moduleInstance?._leak_held_bytes
          ? moduleInstance._leak_held_bytes()
          : 0;
        const heldBlocks = moduleInstance?._leak_block_count
          ? moduleInstance._leak_block_count()
          : 0;
        const wasmBytes = getWasmBytes();
        const jsHeap = performance.memory?.usedJSHeapSize ?? null;

        const lines = [
          `module: ${moduleInstance ? 'ready' : 'none'}`,
          `wasm memory: ${formatBytes(wasmBytes)}`,
          `held bytes: ${formatBytes(heldBytes)} (${heldBlocks} blocks)`,
          `js heap: ${jsHeap ? formatBytes(jsHeap) : 'n/a'}`
        ];
        statsEl.textContent = lines.join('\n');
      }

      async function createModuleInstance() {
        if (moduleInstance) {
          log('module already exists');
          return;
        }
        if (typeof createModule !== 'function') {
          log('createModule not found (check leak.js)');
          return;
        }
        log('loading module...');
        moduleInstance = await createModule({
          print: (text) => log(`wasm: ${text}`),
          printErr: (text) => log(`wasm error: ${text}`)
        });
        window.Module = moduleInstance;
        log('module ready');
        updateStats();
      }

      function destroyModuleInstance() {
        if (!moduleInstance) {
          log('no module to destroy');
          return;
        }
        try {
          moduleInstance._emscripten_shutdown?.();
        } catch (err) {
          log(`shutdown error: ${err}`);
        }
        moduleInstance = null;
        window.Module = null;
        log('module released');
        updateStats();
      }

      function holdBytes() {
        if (!moduleInstance) {
          log('no module loaded');
          return;
        }
        const bytes = Number.parseInt(bytesInput.value, 10) || 0;
        moduleInstance._leak_hold(bytes);
        log(`hold ${bytes} bytes`);
        updateStats();
      }

      function clearHolds() {
        if (!moduleInstance) {
          log('no module loaded');
          return;
        }
        moduleInstance._leak_clear();
        log('cleared holds');
        updateStats();
      }

      document.getElementById('create').addEventListener('click', () => {
        createModuleInstance();
      });
      document.getElementById('destroy').addEventListener('click', () => {
        destroyModuleInstance();
      });
      document.getElementById('hold').addEventListener('click', () => {
        holdBytes();
      });
      document.getElementById('clear').addEventListener('click', () => {
        clearHolds();
      });

      setInterval(updateStats, 500);
      updateStats();
    </script>
  </body>
</html>
