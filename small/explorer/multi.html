<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Flecs Multi Conn Demo</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d1017;
        --panel: #121724;
        --panel-border: #20283a;
        --muted: #9aa3b6;
        --text: #e2e6f0;
        --button: #1f2636;
        --button-border: #2b344a;
        --button-hover: #2a3248;
      }
      * {
        box-sizing: border-box;
      }
      html, body {
        height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
      }
      #layout {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        padding: 12px;
        height: 100%;
      }
      .app {
        display: grid;
        grid-template-rows: auto auto 1fr;
        gap: 8px;
        padding: 10px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        min-height: 0;
      }
      .app-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .app-title {
        font-weight: 700;
      }
      .status {
        font-size: 12px;
        color: var(--muted);
      }
      .app-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .app-controls button {
        background: var(--button);
        color: var(--text);
        border: 1px solid var(--button-border);
        border-radius: 6px;
        padding: 6px 10px;
        cursor: pointer;
        font-size: 12px;
      }
      .app-controls button:hover {
        background: var(--button-hover);
      }
      .app-body {
        display: grid;
        grid-template-rows: minmax(220px, 1fr) auto;
        gap: 8px;
        min-height: 0;
      }
      .canvas {
        width: 100%;
        height: 100%;
        display: block;
        background: #0b0d12;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
      }
      .output {
        background: #0f131d;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        padding: 8px;
        white-space: pre-wrap;
        font-size: 12px;
        overflow: auto;
        min-height: 140px;
      }
      @media (max-width: 1000px) {
        #layout {
          grid-template-columns: 1fr;
          height: auto;
        }
      }
    </style>
  </head>
  <body>
    <div id="layout">
      <section class="app" data-js="explorer_demo.js" data-factory="explorer_demo" data-title="App A">
        <div class="app-header">
          <div class="app-title">App A</div>
          <div class="status">Status: booting</div>
        </div>
        <div class="app-controls">
          <button data-action="enable-spin">Enable Spin</button>
          <button data-action="disable-spin">Disable Spin</button>
          <button data-action="enable-draw">Enable DrawScene</button>
          <button data-action="disable-draw">Disable DrawScene</button>
          <button data-action="query-spin">Query Spin</button>
          <button data-action="set-spin-45">Set Spin = 45</button>
          <button data-action="query-all-entities">Query All</button>
          <button data-action="query-all-systems">Query Systems</button>
        </div>
        <div class="app-body">
          <canvas class="canvas"></canvas>
          <pre class="output">Waiting for connection...</pre>
        </div>
      </section>

      <section class="app" data-js="explorer_demo.js" data-factory="explorer_demo" data-title="App B">
        <div class="app-header">
          <div class="app-title">App B</div>
          <div class="status">Status: booting</div>
        </div>
        <div class="app-controls">
          <button data-action="enable-spin">Enable Spin</button>
          <button data-action="disable-spin">Disable Spin</button>
          <button data-action="enable-draw">Enable DrawScene</button>
          <button data-action="disable-draw">Disable DrawScene</button>
          <button data-action="query-spin">Query Spin</button>
          <button data-action="set-spin-45">Set Spin = 45</button>
          <button data-action="query-all-entities">Query All</button>
          <button data-action="query-all-systems">Query Systems</button>
        </div>
        <div class="app-body">
          <canvas class="canvas"></canvas>
          <pre class="output">Waiting for connection...</pre>
        </div>
      </section>
    </div>

    <script>
      const scriptCache = new Map();

      function loadScript(src) {
        if (scriptCache.has(src)) {
          return scriptCache.get(src);
        }
        const promise = new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.async = true;
          script.src = src;
          script.onload = () => resolve();
          script.onerror = () => reject(new Error(`failed to load ${src}`));
          document.head.appendChild(script);
        });
        scriptCache.set(src, promise);
        return promise;
      }

      function setStatus(el, text) {
        el.textContent = `Status: ${text}`;
      }

      function parseReply(reply) {
        if (!reply) return null;
        try {
          return JSON.parse(reply);
        } catch {
          return { raw: reply };
        }
      }

      function makeRequest(nativeRequest, method, path, params = {}, body = '') {
        const qs = new URLSearchParams(params).toString();
        const url = qs ? `${path}?${qs}` : path;
        const reply = nativeRequest(method, url, body || '');
        return parseReply(reply);
      }

      function initCanvasSize(canvas) {
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        const width = Math.max(1, Math.floor(rect.width * dpr));
        const height = Math.max(1, Math.floor(rect.height * dpr));
        if (canvas.width !== width || canvas.height !== height) {
          canvas.width = width;
          canvas.height = height;
        }
      }

      function attachResizeObserver(canvas, mod) {
        if (!('ResizeObserver' in window)) {
          return;
        }
        const observer = new ResizeObserver(() => {
          initCanvasSize(canvas);
          if (mod && typeof mod._emscripten_resize === 'function') {
            mod._emscripten_resize(canvas.width, canvas.height);
          }
        });
        observer.observe(canvas);
      }

      function setupApp(section, index) {
        const jsFile = section.dataset.js;
        const factoryName = section.dataset.factory;
        const label = section.dataset.title || 'App';
        const statusEl = section.querySelector('.status');
        const outputEl = section.querySelector('.output');
        const canvas = section.querySelector('.canvas');
        const buttons = Array.from(section.querySelectorAll('[data-action]'));

        const jsUrl = new URL(jsFile, window.location.href).toString();
        const jsBase = jsUrl.replace(/[^/]+$/, '');

        if (!canvas.id) {
          canvas.id = `wasm-canvas-${index + 1}`;
        }
        initCanvasSize(canvas);
        setStatus(statusEl, 'loading');

        loadScript(jsUrl)
          .then(() => {
            const factory = window[factoryName];
            if (typeof factory !== 'function') {
              throw new Error(`missing wasm factory ${factoryName}`);
            }
            return factory({
              canvas,
              locateFile: (path) => jsBase + path,
              print: (text) => console.log(`[${label}]`, text),
              printErr: (text) => console.error(`[${label}]`, text),
            });
          })
          .then((mod) => {
            const nativeRequest = mod.cwrap('flecs_explorer_request', 'string',
              ['string', 'string', 'string']);
            attachResizeObserver(canvas, mod);
            setStatus(statusEl, 'ready');

            const actions = {
              'enable-spin': () => makeRequest(nativeRequest, 'PUT', '/toggle/AdvanceSpin', { enable: true }),
              'disable-spin': () => makeRequest(nativeRequest, 'PUT', '/toggle/AdvanceSpin', { enable: false }),
              'enable-draw': () => makeRequest(nativeRequest, 'PUT', '/toggle/DrawScene', { enable: true }),
              'disable-draw': () => makeRequest(nativeRequest, 'PUT', '/toggle/DrawScene', { enable: false }),
              'query-spin': () => makeRequest(nativeRequest, 'GET', '/query', { expr: 'Spin', values: true }),
              'set-spin-45': () => makeRequest(
                nativeRequest,
                'PUT',
                '/component/Spinner',
                { component: 'Spin', value: JSON.stringify({ angle: 45.0 }) }
              ),
              'query-all-entities': () => makeRequest(
                nativeRequest,
                'GET',
                '/world',
                { expr: 'Counter', values: true }
              ),
              'query-all-systems': () => makeRequest(
                nativeRequest,
                'GET',
                '/query',
                { expr: 'flecs.system.System', table: true, values: true, entity_ids: true, type_info: true }
              ),
            };

            buttons.forEach((btn) => {
              btn.addEventListener('click', () => {
                const action = actions[btn.dataset.action];
                if (!action) return;
                try {
                  const result = action();
                  outputEl.textContent = result ? JSON.stringify(result, null, 2) : '(no reply)';
                } catch (err) {
                  outputEl.textContent = err ? String(err) : 'unknown error';
                }
              });
            });
          })
          .catch((err) => {
            setStatus(statusEl, 'error');
            outputEl.textContent = err ? String(err) : 'unknown error';
          });
      }

      document.querySelectorAll('.app').forEach((section, index) => {
        setupApp(section, index);
      });
    </script>
  </body>
</html>
