<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Flecs Explorer Demo</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        background: #101115;
        color: #dde0e6;
        font-family: Arial, Helvetica, sans-serif;
      }
      #toolbar {
        position: fixed;
        top: 8px;
        left: 12px;
        z-index: 10;
        font-size: 14px;
      }
      #toolbar a {
        color: #a2d8b4;
        text-decoration: none;
        margin-left: 8px;
      }
      #canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      Flecs Explorer Demo
      <a id="explorer-link" target="_blank">Open in Explorer</a>
    </div>

    <canvas id="canvas"></canvas>

    <script src="explorer_demo.js"></script>
    <script>
      const base = new URL('.', window.location.href).toString();
      const explorerLink = document.getElementById('explorer-link');
      explorerLink.href = 'https://www.flecs.dev/explorer/?host=' +
        encodeURIComponent(base + 'explorer_demo.wasm');

      explorer_demo({
        canvas: document.getElementById('canvas'),
        locateFile: (path) => base + path,
        print: (text) => console.log('[WASM]', text),
        printErr: (text) => console.error('[WASM]', text)
      }).then((module) => {
        window.Module = module;
      });
    </script>
  </body>
</html>
