<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Flecs Conn Demo</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html, body {
        height: 100%;
        margin: 0;
        background: #0f1115;
        color: #e3e7ee;
        font-family: Arial, Helvetica, sans-serif;
      }
      #toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        background: #151924;
        border-bottom: 1px solid #222838;
      }
      #toolbar button {
        background: #1f2533;
        color: #e3e7ee;
        border: 1px solid #2b3247;
        border-radius: 6px;
        padding: 6px 10px;
        cursor: pointer;
      }
      #toolbar button:hover {
        background: #293146;
      }
      #status {
        margin-left: auto;
        font-size: 12px;
        opacity: 0.8;
      }
      #layout {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 12px;
        padding: 12px;
        height: calc(100% - 48px);
        box-sizing: border-box;
      }
      #canvas {
        width: 100%;
        height: 100%;
        display: block;
        background: #0b0d12;
        border: 1px solid #202638;
        border-radius: 8px;
      }
      #output {
        background: #11151e;
        border: 1px solid #202638;
        border-radius: 8px;
        padding: 8px;
        white-space: pre-wrap;
        font-size: 12px;
        overflow: auto;
      }
      @media (max-width: 900px) {
        #layout {
          grid-template-columns: 1fr;
          height: auto;
        }
        #canvas {
          min-height: 320px;
        }
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <strong>Flecs Conn Demo</strong>
      <button id="enable-spin">Enable Spin</button>
      <button id="disable-spin">Disable Spin</button>
      <button id="enable-draw">Enable DrawScene</button>
      <button id="disable-draw">Disable DrawScene</button>
      <button id="query-spin">Query Spin</button>
      <button id="set-spin-45">Set Spin = 45</button>
      <button id="query-all-entities">Query All</button>
      <button id="query-all-systems">Query All Systems</button>
      <span id="status">Status: booting</span>
    </div>

    <div id="layout">
      <canvas id="canvas"></canvas>
      <pre id="output">Waiting for connection...</pre>
    </div>

    <script src="explorer_demo.js"></script>
    <script>
      const outputEl = document.getElementById('output');
      const statusEl = document.getElementById('status');
      const canvasEl = document.getElementById('canvas');
      const base = new URL('.', window.location.href).toString();
      let nativeRequest = null;

      function setStatus(text) {
        statusEl.textContent = `Status: ${text}`;
      }

      function parseReply(reply) {
        if (!reply) return null;
        try {
          return JSON.parse(reply);
        } catch {
          return { raw: reply };
        }
      }

      function request(method, path, params = {}, body = '') {
        if (!nativeRequest) {
          throw new Error('nativeRequest not ready');
        }
        const qs = new URLSearchParams(params).toString();
        const url = qs ? `${path}?${qs}` : path;
        const reply = nativeRequest(method, url, body || '');
        return parseReply(reply);
      }

      function toggleSystem(name, enabled) {
        return request('PUT', `/toggle/${name}`, { enable: enabled });
      }

      function showResult(result) {
        outputEl.textContent = result ? JSON.stringify(result, null, 2) : '(no reply)';
      }

      function showError(err) {
        outputEl.textContent = err ? String(err) : 'unknown error';
      }

      explorer_demo({
        canvas: canvasEl,
        locateFile: (path) => base + path,
        print: (text) => console.log('[WASM]', text),
        printErr: (text) => console.error('[WASM]', text)
      }).then((mod) => {
        nativeRequest = mod.cwrap('flecs_explorer_request', 'string',
          ['string', 'string', 'string']);
        window.Module = mod;
        setStatus('ready');
      }).catch((err) => {
        setStatus('error');
        showError(err);
      });

      document.getElementById('enable-spin').addEventListener('click', () => {
        try {
          showResult(toggleSystem('AdvanceSpin', true));
        } catch (err) {
          showError(err);
        }
      });
      document.getElementById('disable-spin').addEventListener('click', () => {
        try {
          showResult(toggleSystem('AdvanceSpin', false));
        } catch (err) {
          showError(err);
        }
      });
      document.getElementById('enable-draw').addEventListener('click', () => {
        try {
          showResult(toggleSystem('DrawScene', true));
        } catch (err) {
          showError(err);
        }
      });
      document.getElementById('disable-draw').addEventListener('click', () => {
        try {
          showResult(toggleSystem('DrawScene', false));
        } catch (err) {
          showError(err);
        }
      });
      document.getElementById('query-spin').addEventListener('click', () => {
        try {
          showResult(request('GET', '/query', { expr: 'Spin', values: true }));
        } catch (err) {
          showError(err);
        }
      });
      document.getElementById('set-spin-45').addEventListener('click', () => {
        try {
          const value = JSON.stringify({ angle: 45.0 });
          showResult(request('PUT', '/component/Spinner', { component: 'Spin', value }));
        } catch (err) {
          showError(err);
        }
      });
      document.getElementById('query-all-entities').addEventListener('click', () => {
        try {
          showResult(request('GET', '/world', { expr: 'Counter', values: true }));
        } catch (err) {
          showError(err);
        }
      });
      document.getElementById('query-all-systems').addEventListener('click', () => {
        try {
          showResult(request('GET', '/query', { expr: 'flecs.system.System', table: true, values: true, entity_ids: true, type_info: true }));
        } catch (err) {
          showError(err);
        }
      });
    </script>
  </body>
</html>
