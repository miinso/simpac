<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Flecs Systems Toggle (Worker)</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0d1017;
            --panel: #121724;
            --panel-border: #20283a;
            --muted: #9aa3b6;
            --text: #e2e6f0;
            --button: #1f2636;
            --button-border: #2b344a;
            --button-hover: #2a3248;
            --accent: #2a8f6a;
            --accent-off: #93404a;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
        }

        #toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: var(--panel);
            border-bottom: 1px solid var(--panel-border);
        }

        #toolbar button {
            background: var(--button);
            color: var(--text);
            border: 1px solid var(--button-border);
            border-radius: 6px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 12px;
        }

        #toolbar button:hover {
            background: var(--button-hover);
        }

        #toolbar label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--muted);
        }

        #filter {
            background: #0f131d;
            color: var(--text);
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            padding: 6px 8px;
            font-size: 12px;
            min-width: 180px;
        }

        #status {
            margin-left: auto;
            font-size: 12px;
            color: var(--muted);
        }

        #layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 12px;
            padding: 12px;
            height: calc(100% - 52px);
            box-sizing: border-box;
        }

        #canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #0b0d12;
            border: 1px solid var(--panel-border);
            border-radius: 8px;
        }

        #panel {
            display: grid;
            grid-template-rows: minmax(220px, 1fr) auto;
            gap: 10px;
            min-height: 0;
        }

        #system-list {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 8px;
            overflow: auto;
        }

        .system-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 6px;
            border: 1px solid transparent;
            margin-bottom: 6px;
            background: #141a27;
        }

        .system-row:last-child {
            margin-bottom: 0;
        }

        .system-row.is-disabled {
            opacity: 0.65;
        }

        .system-name {
            font-size: 12px;
            word-break: break-word;
        }

        .toggle-btn {
            border: 1px solid var(--button-border);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            color: #fff;
            background: var(--accent);
        }

        .toggle-btn.is-disabled {
            background: var(--accent-off);
        }

        #output {
            background: #0f131d;
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 8px;
            white-space: pre-wrap;
            font-size: 12px;
            overflow: auto;
            min-height: 140px;
        }

        @media (max-width: 900px) {
            #layout {
                grid-template-columns: 1fr;
                height: auto;
            }

            #canvas {
                min-height: 280px;
            }
        }
    </style>
</head>

<body>
    <div id="toolbar">
        <strong>Flecs Systems (Worker)</strong>
        <button id="refresh">Refresh Systems</button>
        <label><input type="checkbox" id="show-flecs" /> Show flecs</label>
        <input id="filter" placeholder="filter systems" />
        <span id="status">Status: booting</span>
    </div>

    <div id="layout">
        <canvas id="canvas"></canvas>
        <div id="panel">
            <div id="system-list">Waiting for connection...</div>
            <pre id="output">No requests yet.</pre>
        </div>
    </div>

    <script type="module">
        async function loadModule(url) {
            try {
                return await import(url);
            } catch (err) {
                try {
                    const response = await fetch(url, { cache: 'no-store' });
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    const text = await response.text();
                    const blob = new Blob([text], { type: 'text/javascript' });
                    const blobUrl = URL.createObjectURL(blob);
                    const mod = await import(blobUrl);
                    URL.revokeObjectURL(blobUrl);
                    return mod;
                } catch (blobErr) {
                    throw new Error(`${err?.message || err} / ${blobErr?.message || blobErr}`);
                }
            }
        }

        async function loadBridge() {
            const candidates = [
                new URL('simpac_worker_bridge.js', window.location.href).toString(),
                // new URL('../leak/simpac_worker_bridge.js', window.location.href).toString()
            ];
            for (const url of candidates) {
                try {
                    return await loadModule(url);
                } catch (err) {
                    console.warn(`[systems-worker] ${url} failed: ${err.message}`);
                }
            }
            throw new Error('simpac_worker_bridge.js not found');
        }

        const { SimpacWorker } = await loadBridge();

        const outputEl = document.getElementById('output');
        const statusEl = document.getElementById('status');
        const listEl = document.getElementById('system-list');
        const filterEl = document.getElementById('filter');
        const showFlecsEl = document.getElementById('show-flecs');
        const refreshBtn = document.getElementById('refresh');
        const canvasEl = document.getElementById('canvas');
        const scriptUrl = new URL('explorer_demo.js', window.location.href).toString();
        const wasmUrl = null; // Single-file build; set .wasm URL for split builds.
        let worker = null;
        let allSystems = [];
        let resizeTimer = null;
        let canvasTransferred = false;

        const flecsPrefixes = [
            'flecs.pipeline',
            'flecs.timer',
            'flecs.stats',
            'flecs.rest',
            'flecs.core',
        ];

        function setStatus(text) {
            statusEl.textContent = `Status: ${text}`;
        }

        function parseReply(reply) {
            if (!reply) return null;
            try {
                return JSON.parse(reply);
            } catch {
                return { raw: reply };
            }
        }

        function escapePath(path) {
            let result = path.replaceAll('/', '%5C%2F');
            result = result.replaceAll('\\.', '@@');
            result = result.replaceAll('.', '/');
            result = result.replaceAll('@@', '.');
            result = result.replaceAll('#', '%23');
            return result;
        }

        async function request(method, path, params = {}, body = '') {
            if (!worker || !worker.ready) {
                throw new Error('worker not ready');
            }
            const qs = new URLSearchParams(params).toString();
            const url = qs ? `${path}?${qs}` : path;
            const reply = await worker.callCwrap(
                'flecs_explorer_request',
                'string',
                ['string', 'string', 'string'],
                method,
                url,
                body || ''
            );
            return parseReply(reply);
        }

        async function toggleSystem(name, enabled) {
            return request('PUT', `/toggle/${name}`, { enable: enabled });
        }

        function showResult(result) {
            outputEl.textContent = result ? JSON.stringify(result, null, 2) : '(no reply)';
        }

        function showError(err) {
            outputEl.textContent = err ? String(err) : 'unknown error';
        }

        function systemPath(item) {
            if (!item) return '';
            const name = item.name || '';
            const parent = item.parent || '';
            if (parent && name) {
                return `${parent}.${name}`;
            }
            return name || parent;
        }

        function isFlecsSystem(item) {
            const parent = item.parent || '';
            const path = parent || item.name || '';
            if (!path) return false;
            return flecsPrefixes.some((prefix) => path.startsWith(prefix));
        }

        function normalizeSystem(item) {
            const path = systemPath(item);
            const tagList = Array.isArray(item.tags) ? item.tags : [];
            const tagDisabled =
                tagList.includes('Disabled') ||
                tagList.includes('flecs.core.Disabled') ||
                tagList.includes('EcsDisabled');
            const fieldDisabled = !!(
                item.fields &&
                Array.isArray(item.fields.is_set) &&
                item.fields.is_set[1]
            );
            const isDisabled = tagDisabled || fieldDisabled;
            return {
                path,
                label: path,
                disabled: isDisabled,
                isFlecs: isFlecsSystem(item),
            };
        }

        function renderSystems() {
            const filter = (filterEl.value || '').trim().toLowerCase();
            const showFlecs = showFlecsEl.checked;
            const systems = allSystems.filter((system) => {
                if (!system.path) return false;
                if (!showFlecs && system.isFlecs) return false;
                if (!filter) return true;
                return system.label.toLowerCase().includes(filter);
            });

            listEl.innerHTML = '';
            if (!systems.length) {
                listEl.textContent = 'No systems found.';
                return;
            }

            systems.forEach((system) => {
                const row = document.createElement('div');
                row.className = 'system-row';
                if (system.disabled) {
                    row.classList.add('is-disabled');
                }

                const toggleBtn = document.createElement('button');
                toggleBtn.className = 'toggle-btn';
                if (system.disabled) {
                    toggleBtn.classList.add('is-disabled');
                }
                toggleBtn.textContent = system.disabled ? 'Enable' : 'Disable';
                toggleBtn.addEventListener('click', async () => {
                    try {
                        const enable = system.disabled;
                        const reply = await toggleSystem(
                            escapePath(system.path),
                            enable
                        );
                        system.disabled = !enable;
                        showResult(reply);
                        renderSystems();
                    } catch (err) {
                        showError(err);
                    }
                });

                const label = document.createElement('div');
                label.className = 'system-name';
                label.textContent = system.label;

                row.appendChild(toggleBtn);
                row.appendChild(label);
                listEl.appendChild(row);
            });
        }

        async function refreshSystems() {
            if (!worker || !worker.ready) {
                return;
            }
            setStatus('querying systems');
            try {
                let reply = await request('GET', '/query', {
                    expr: 'flecs.system.System',
                    table: true,
                    full_paths: true,
                    limit: 1000,
                });
                if (reply && reply.error) {
                    throw new Error(reply.error);
                }
                let results = reply && reply.results ? reply.results : [];
                if (!results.length) {
                    reply = await request('GET', '/query', {
                        expr: 'System',
                        table: true,
                        full_paths: true,
                        limit: 1000,
                    });
                    if (reply && reply.error) {
                        throw new Error(reply.error);
                    }
                    results = reply && reply.results ? reply.results : [];
                }
                allSystems = results.map(normalizeSystem).filter((sys) => sys.path);
                renderSystems();
                setStatus(`ready (${allSystems.length})`);
            } catch (err) {
                setStatus('error');
                showError(err);
            }
        }

        function initCanvasSize(canvas) {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            const width = Math.max(1, Math.floor(rect.width * dpr));
            const height = Math.max(1, Math.floor(rect.height * dpr));
            if (!canvasTransferred && (canvas.width !== width || canvas.height !== height)) {
                canvas.width = width;
                canvas.height = height;
            }
            return { width, height };
        }

        function attachResizeObserver(canvas) {
            if (!('ResizeObserver' in window)) {
                return;
            }
            const observer = new ResizeObserver(() => {
                const { width, height } = initCanvasSize(canvas);
                if (!worker || !worker.ready) return;
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    worker.call('_emscripten_resize', width, height)
                        .catch(() => {});
                }, 50);
            });
            observer.observe(canvas);
        }

        if (!('transferControlToOffscreen' in HTMLCanvasElement.prototype)) {
            setStatus('error');
            showError('OffscreenCanvas not supported in this browser');
        } else {
            initCanvasSize(canvasEl);
            setStatus('loading');
            worker = new SimpacWorker(canvasEl, wasmUrl, scriptUrl, {
                exports: ['_emscripten_resize'],
                cwrap: ['flecs_explorer_request'],
                moduleFactoryName: 'createModule',
                onReady: () => {
                    setStatus('ready');
                    attachResizeObserver(canvasEl);
                    refreshSystems();
                },
                onError: (message, detail) => {
                    setStatus('error');
                    showError(`${message} ${detail || ''}`.trim());
                },
            });
            worker.start();
            canvasTransferred = true;
        }

        refreshBtn.addEventListener('click', () => {
            refreshSystems();
        });

        filterEl.addEventListener('input', () => {
            renderSystems();
        });

        showFlecsEl.addEventListener('change', () => {
            renderSystems();
        });
    </script>
</body>

</html>
